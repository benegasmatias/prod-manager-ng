<div class="flex min-h-screen flex-col bg-background font-sans">
    <!-- Header -->
    <header class="flex h-16 items-center bg-primary px-8 dark:bg-card shadow-sm">
        <div class="flex items-center gap-3 text-white">
            <!-- Logo - Assuming it exists in public/logo.png -->
            <img src="assets/logo.png" alt="Logo" class="h-8 w-8 object-contain rounded-lg brightness-0 invert"
                onerror="this.style.display='none'" />
            <span class="text-xl font-black tracking-tighter uppercase">ProdManager</span>
        </div>
    </header>

    <main class="flex flex-1 items-center justify-center p-8">
        <div
            class="mx-auto flex w-full max-w-6xl flex-col items-center gap-12 lg:flex-row lg:items-start lg:justify-between pt-12">
            <!-- Left Side: Title -->
            <div class="max-w-md lg:pt-12 text-center lg:text-left space-y-6">
                <!-- Using assets/logo.png -->
                <img src="assets/logo.png" alt="Logo"
                    class="h-16 w-16 mx-auto lg:mx-0 object-contain rounded-2xl shadow-xl shadow-primary/20 mb-4" />
                <h1 class="text-4xl font-black leading-tight tracking-tight text-foreground sm:text-5xl">
                    Iniciá sesión en tu panel de <span class="text-primary italic">Producción</span>
                </h1>

                <div class="flex flex-col gap-4">
                    <a href="https://wa.me/..." target="_blank"
                        class="flex items-center gap-4 rounded-3xl bg-card p-6 shadow-sm border border-border transition-all hover:shadow-md group max-w-sm mx-auto lg:mx-0">
                        <div
                            class="h-10 w-10 rounded-2xl bg-muted flex items-center justify-center text-muted-foreground group-hover:text-primary transition-colors">
                            <!-- SVG Icon for AlertCircle -->
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg>
                        </div>
                        <div class="text-left">
                            <p class="text-sm font-bold text-foreground">¿Tenés problemas?</p>
                            <p class="text-xs text-muted-foreground font-medium">Contactá con soporte técnico</p>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Right Side: Login Card -->
            <div class="w-full max-w-[440px]">
                <div
                    class="rounded-[2.5rem] bg-card p-10 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] border border-border">
                    <form (submit)="handleSubmit(); $event.preventDefault()" class="space-y-8">
                        <div class="space-y-2">
                            <label for="email"
                                class="text-[10px] font-black uppercase tracking-[0.2em] text-muted-foreground ml-1">
                                E-mail o usuario
                            </label>
                            <input id="email" name="email" type="email" [ngModel]="email()"
                                (ngModelChange)="email.set($event)" required placeholder="Ingresá tu correo"
                                class="flex h-14 w-full rounded-2xl border-2 border-border bg-transparent px-5 text-sm font-bold transition-all focus:border-primary focus:ring-4 focus:ring-primary/5" />
                        </div>

                        <div class="space-y-2">
                            <div class="flex items-center justify-between ml-1">
                                <label for="password"
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-muted-foreground">
                                    Contraseña
                                </label>
                                <a routerLink="/forgot-password"
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-primary hover:underline">
                                    ¿Olvidaste?
                                </a>
                            </div>
                            <input id="password" name="password" type="password" [ngModel]="password()"
                                (ngModelChange)="password.set($event)" required placeholder="••••••••"
                                class="flex h-14 w-full rounded-2xl border-2 border-border bg-transparent px-5 text-sm font-bold transition-all focus:border-primary focus:ring-4 focus:ring-primary/5" />
                        </div>

                        <!-- Error Message -->
                        @if (error()) {
                        <div
                            class="flex items-center gap-3 rounded-2xl bg-red-50 p-4 text-xs font-bold text-red-600 dark:bg-red-900/20 dark:text-red-400">
                            <span>{{ error() }}</span>
                        </div>
                        }

                        <div class="space-y-4 pt-2">
                            <button type="submit" [disabled]="loading()"
                                class="h-14 w-full rounded-2xl bg-primary px-6 font-black text-sm uppercase tracking-[0.1em] text-primary-foreground shadow-lg shadow-primary/20 hover:shadow-xl transition-all active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-3">
                                @if (loading()) {
                                <span>Entrando...</span>
                                } @else {
                                <span>Continuar</span>
                                }
                            </button>

                            <div class="pt-2 text-center">
                                <a routerLink="/register" class="text-sm font-bold text-primary hover:underline">
                                    Crear cuenta
                                </a>
                            </div>
                        </div>

                        <div class="relative py-4">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-zinc-100 dark:border-zinc-800"></div>
                            </div>
                            <div class="relative flex justify-center text-[10px] font-black uppercase tracking-[0.2em]">
                                <span class="bg-card px-4 text-muted-foreground">O</span>
                            </div>
                        </div>

                        <button type="button" (click)="handleGoogleSignIn()" [disabled]="googleLoading() || loading()"
                            class="h-14 w-full rounded-2xl border-2 border-border bg-card px-6 font-bold text-sm text-foreground hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all flex items-center justify-center gap-4">
                            <svg class="h-5 w-5" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            <span class="text-zinc-600 dark:text-zinc-300">Iniciar sesión con Google</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-100 bg-white p-8 dark:border-zinc-800 dark:bg-zinc-900">
        <div
            class="mx-auto flex max-w-6xl flex-col items-center justify-between gap-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400 sm:flex-row">
            <div class="flex items-center gap-6">
                <a routerLink="/privacy" class="hover:text-primary transition-colors">Privacidad</a>
                <a routerLink="/terms" class="hover:text-primary transition-colors">Términos y condiciones</a>
                <a href="https://wa.me/..." target="_blank" class="hover:text-primary transition-colors">Ayuda</a>
            </div>
            <p>© 2024 ProdManager Inc. Todos los derechos reservados.</p>
        </div>
    </footer>
</div>
