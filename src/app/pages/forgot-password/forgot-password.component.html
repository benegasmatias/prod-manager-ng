<div class="flex min-h-screen items-center justify-center p-8 bg-[#f5f5f5]">
  <div class="w-full max-w-md p-10 bg-white rounded-[2.5rem] shadow-xl">
    <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Restablecer Contraseña</h2>
    
    @if (error()) {
      <div class="p-4 mb-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold">
        {{ error() }}
      </div>
    }

    @if (success()) {
      <div class="p-4 mb-4 bg-emerald-50 text-emerald-600 rounded-2xl text-xs font-bold">
        {{ success() }}
      </div>
      <a routerLink="/login" class="block w-full text-center py-4 bg-primary text-white rounded-2xl font-black uppercase text-sm tracking-widest hover:brightness-110 active:scale-[0.98] transition-all">
        Volver al Login
      </a>
    } @else {
      <form (submit)="handleSubmit(); $event.preventDefault()" class="space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase text-zinc-400">Tu E-mail</label>
          <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required
            class="w-full h-14 border-2 border-zinc-100 rounded-2xl px-5 text-sm font-bold focus:border-primary transition-all outline-none">
        </div>

        <button type="submit" [disabled]="loading()"
          class="w-full h-14 bg-primary text-white rounded-2xl font-black uppercase text-sm tracking-widest disabled:opacity-50 hover:brightness-110 active:scale-[0.98] transition-all">
          @if (loading()) { Verificando... } @else { Enviar Instrucciones }
        </button>
        
        <div class="text-center">
          <a routerLink="/login" class="text-xs font-bold text-zinc-400 hover:text-primary uppercase tracking-widest transition-colors">Cancelar</a>
        </div>
      </form>
    }
  </div>
</div>
