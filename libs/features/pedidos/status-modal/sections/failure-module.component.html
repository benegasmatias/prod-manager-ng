<div class="failure-container animate-in slide-in-from-right duration-500">
  <!-- Header Info -->
  <div class="input-label">
    <label class="label-text flex items-center gap-2">
      <div class="h-1.5 w-3 rounded-full bg-red-500"></div>
      Motivo de la falla
    </label>
    <div class="flex items-center gap-2">
      <span class="text-[8px] font-bold text-zinc-400 uppercase">Detectado en:</span>
      <span
        [class]="cn('text-[8px] font-black px-2 py-0.5 rounded-full border uppercase tracking-wider', getStyles(order.status))">
        {{ getLabel(order.status) }}
      </span>
    </div>
  </div>

  <!-- Reason Input -->
  <textarea [ngModel]="reason()" (ngModelChange)="reason.set($event)" rows="3"
    placeholder="Describe brevemente qué pasó..." class="reason-area shadow-sm dark:bg-zinc-950"></textarea>

  <div class="grid grid-cols-2 gap-4">
    <!-- Time Lost -->
    <div class="space-y-2">
      <label class="label-text">Tiempo Perdido</label>
      <div class="modern-input-group">
        <input type="number" min="0" [ngModel]="wastedTime()" 
               (ngModelChange)="wastedTime.set(Math.max(0, $event))" class="modern-input">
        <span class="input-suffix">MIN</span>
      </div>
    </div>

    <!-- Total Summary -->
    <div class="space-y-2">
      <label class="label-text text-red-500/80">Merma Total</label>
      <div class="summary-card">
        <span class="text-[9px] font-black text-red-500/70 uppercase tracking-widest">Acumulado</span>
        <span class="total-value">{{ getTotalWasted() }}g</span>
      </div>
    </div>
  </div>

  <!-- Dynamic Material Wastes List -->
  <div class="space-y-3 pt-1">
    <div class="flex items-center justify-between px-1">
      <label class="label-text">Desglose por Material</label>
      <span class="text-[8px] font-bold text-zinc-400 uppercase">{{ materialWastes().length }} materiales</span>
    </div>

    <div class="space-y-2.5 max-h-[160px] overflow-y-auto pr-1 custom-scrollbar">
      @for (waste of materialWastes(); track $index) {
      <div class="flex items-center gap-2.5 animate-in fade-in slide-in-from-left duration-300">
        <!-- Selector Display -->
        <div class="flex-1">
          <app-material-selector
            [materials]="materials"
            [selectedId]="waste.materialId"
            (selectChange)="onMaterialChange.emit({ index: $index, materialId: $event })"
          ></app-material-selector>
        </div>

        <!-- Grams Input -->
        <div class="relative w-28">
          <input type="number" min="0" [ngModel]="waste.grams" 
            (ngModelChange)="handleGramsChange($index, $event)"
            placeholder="0" class="modern-input grams-input !pr-10 !h-12 !rounded-2xl">
          <span class="input-suffix !right-3.5">G</span>
        </div>

        <!-- Remove Button -->
        <button (click)="onRemoveMaterial.emit($index)"
          class="h-12 w-12 flex items-center justify-center rounded-2xl bg-rose-500/5 text-rose-500 hover:bg-rose-500 hover:text-white transition-all border border-rose-500/10">
          <lucide-angular [img]="Trash2" class="h-4.5 w-4.5"></lucide-angular>
        </button>
      </div>
      }
    </div>

    <!-- Add More Button -->
    <button (click)="onAddRow.emit()"
      class="w-full h-10 rounded-2xl border border-dashed border-zinc-200 dark:border-zinc-800 text-zinc-400 hover:text-primary hover:border-primary/50 hover:bg-primary/5 transition-all flex items-center justify-center gap-2 text-[9px] font-black uppercase tracking-widest">
      <lucide-angular [img]="Plus" class="h-3.5 w-3.5"></lucide-angular>
      Agregar Material de Merma
    </button>
  </div>

  <!-- Post-Failure Action -->
  <div class="grid grid-cols-3 gap-3 pt-2">
    <button (click)="action.set('REDO')"
      [class]="cn('action-card', action() === 'REDO' ? 'active-redo' : 'dark:bg-zinc-900/40')">
      <span class="action-title">Reimprimir</span>
      <span class="action-subtitle">Revertir etapa</span>
    </button>

    <button (click)="action.set('DISCARD')"
      [class]="cn('action-card', action() === 'DISCARD' ? 'active' : 'dark:bg-zinc-900/40')">
      <span class="action-title">Descartar</span>
      <span class="action-subtitle">Falla total</span>
    </button>

    <button (click)="action.set('KEEP')"
      [class]="cn('action-card', action() === 'KEEP' ? 'active' : 'dark:bg-zinc-900/40')">
      <span class="action-title">Mantener</span>
      <span class="action-subtitle">Incidencia</span>
    </button>
  </div>
</div>
