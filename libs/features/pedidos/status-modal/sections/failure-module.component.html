<div class="space-y-10 animate-in slide-in-from-right-12 duration-1000">
  <!-- SYSTEM CONTEXT -->
  <div class="flex items-center justify-between px-4">
    <div class="flex items-center gap-4">
      <div class="h-2 w-2 rounded-full bg-error shadow-[0_0_10px_rgba(var(--error-rgb),0.5)]"></div>
      <label class="text-[9px] font-black text-text-muted/40 uppercase tracking-[0.4em] italic leading-none">Análisis de Incidencia</label>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-[8px] font-black text-text-muted/20 uppercase tracking-[0.2em]">Fase de detección:</span>
      <span
        [class]="cn('text-[9px] font-black px-4 py-1 rounded-full border uppercase tracking-[0.2em] italic shadow-sm transition-all', getStyles(order.status))">
        {{ getLabel(order.status) }}
      </span>
    </div>
  </div>

  <!-- CAUSAL ANALYSIS INTERFACE -->
  <div class="relative group">
    <textarea [ngModel]="reason()" (ngModelChange)="reason.set($event)" rows="3"
      placeholder="Describir naturaleza de la falla técnica..." 
      class="w-full rounded-[1.5rem] border-none bg-surface-container-lowest px-8 py-8 text-sm font-bold text-text focus:ring-4 focus:ring-error/10 transition-all resize-none shadow-xl shadow-text/5 placeholder:text-text-muted/20 placeholder:italic"></textarea>
    <lucide-angular [img]="icons.AlertOctagon" class="absolute right-6 top-8 h-5 w-5 text-error/20 group-focus-within:text-error transition-colors"></lucide-angular>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <!-- CHRONOLOGICAL LOSS -->
    <div class="space-y-3">
      <label class="text-[9px] font-black text-text-muted/40 uppercase tracking-[0.4em] ml-4 italic leading-none">Tiempo Desviado</label>
      <div class="relative group shadow-xl shadow-text/5 rounded-2xl">
        <input type="number" min="0" [ngModel]="wastedTime()" 
               (ngModelChange)="wastedTime.set(Math.max(0, $event))" 
               class="h-14 w-full pl-8 pr-16 rounded-2xl bg-surface-container-lowest border-none text-sm font-black text-text focus:ring-4 focus:ring-error/10 transition-all tabular-nums">
        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[9px] font-black text-text-muted/20 uppercase tracking-widest italic">MIN</span>
      </div>
    </div>

    <!-- CUMULATIVE WASTE ANALYTICS -->
    <div class="space-y-3">
      <label class="text-[9px] font-black text-error/40 uppercase tracking-[0.4em] ml-4 italic leading-none">Masa Total Descartada</label>
      <div class="h-14 rounded-2xl bg-error/5 border border-error/10 flex items-center justify-between px-8 shadow-2xl shadow-error/5">
        <span class="text-[9px] font-black text-error/40 uppercase tracking-[0.3em] italic">Consolidado</span>
        <span class="text-xl font-black text-error tabular-nums font-display tracking-tighter">{{ getTotalWasted() }}<span class="text-[10px] ml-1 opacity-40">G</span></span>
      </div>
    </div>
  </div>

  <!-- INVENTORY DRAIN ARCHITECTURE -->
  <div class="space-y-6">
    <div class="flex items-center justify-between px-4">
      <label class="text-[9px] font-black text-text-muted/40 uppercase tracking-[0.4em] italic leading-none">Materiales Afectados</label>
      <div class="px-4 py-1.5 rounded-full bg-surface-container-low border border-border/5">
        <span class="text-[8px] font-black text-text-muted/60 uppercase tracking-[0.2em] tabular-nums">{{ materialWastes().length }} Entradas</span>
      </div>
    </div>

    <div class="space-y-4 max-h-[220px] overflow-y-auto pr-3 custom-scrollbar">
      @for (waste of materialWastes(); track $index) {
      <div class="flex items-center gap-4 animate-in slide-in-from-left-8 duration-700">
        <!-- SYSTEM SELECTOR -->
        <div class="flex-1">
          <app-material-selector
            [materials]="materials"
            [selectedId]="waste.materialId"
            (selectChange)="onMaterialChange.emit({ index: $index, materialId: $event })"
          ></app-material-selector>
        </div>

        <!-- QUANTITY INTERFACE -->
        <div class="relative w-36 shadow-xl shadow-text/5 rounded-2xl">
          <input type="number" min="0" [ngModel]="waste.grams" 
            (ngModelChange)="handleGramsChange($index, $event)"
            placeholder="0" 
            class="h-14 w-full pl-6 pr-12 rounded-2xl bg-surface-container-lowest border-none text-[12px] font-black text-text focus:ring-4 focus:ring-error/10 transition-all tabular-nums">
          <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[8px] font-black text-text-muted/20 uppercase">G</span>
        </div>

        <!-- PROTOCOL REMOVAL -->
        <button (click)="onRemoveMaterial.emit($index)"
          class="h-14 w-14 flex items-center justify-center rounded-2xl bg-error/5 text-error hover:bg-error hover:text-white transition-all border border-error/10 shadow-xl shadow-error/5 group">
          <lucide-angular [img]="Trash2" class="h-6 w-6 group-hover:scale-110 transition-transform"></lucide-angular>
        </button>
      </div>
      }
    </div>

    <!-- SYSTEM EXPANSION -->
    <button (click)="onAddRow.emit()"
      class="w-full h-14 rounded-2xl border-2 border-dashed border-border/5 text-text-muted/40 hover:text-primary hover:border-primary/40 hover:bg-primary/5 transition-all flex items-center justify-center gap-4 text-[9px] font-black uppercase tracking-[0.4em] italic group">
      <lucide-angular [img]="Plus" class="h-5 w-5 group-hover:rotate-90 transition-transform duration-700"></lucide-angular>
      Vincular Material Adicional
    </button>
  </div>

  <!-- RESOLUTION STRATEGY ARCHITECTURE -->
  <div class="grid grid-cols-3 gap-4 pt-2">
    <button (click)="action.set('REDO')"
      [class]="cn('flex flex-col items-center justify-center p-6 rounded-[1.5rem] transition-all duration-700 border-2 gap-3 group/opt', 
                 action() === 'REDO' ? 'bg-primary border-primary text-white shadow-2xl shadow-primary/30 scale-105' : 'bg-surface-container-low border-border/5 text-text-muted hover:border-primary/20')">
      <lucide-angular [img]="icons.RefreshCw" class="h-6 w-6 opacity-40 group-hover/opt:opacity-100 transition-all" [class.animate-spin]="action() === 'REDO'"></lucide-angular>
      <div class="text-center">
        <span class="text-[9px] font-black uppercase tracking-[0.3em] font-display block leading-none">Relocalizar</span>
        <span class="text-[7px] font-black uppercase tracking-[0.2em] opacity-40 italic block mt-1">Revertir</span>
      </div>
    </button>

    <button (click)="action.set('DISCARD')"
      [class]="cn('flex flex-col items-center justify-center p-6 rounded-[1.5rem] transition-all duration-700 border-2 gap-3 group/opt', 
                 action() === 'DISCARD' ? 'bg-error border-error text-white shadow-2xl shadow-error/30 scale-105' : 'bg-surface-container-low border-border/5 text-text-muted hover:border-error/20')">
      <lucide-angular [img]="icons.Trash2" class="h-6 w-6 opacity-40 group-hover/opt:opacity-100 transition-all"></lucide-angular>
      <div class="text-center">
        <span class="text-[9px] font-black uppercase tracking-[0.3em] font-display block leading-none">Neutralizar</span>
        <span class="text-[7px] font-black uppercase tracking-[0.2em] opacity-40 italic block mt-1">Anulación</span>
      </div>
    </button>

    <button (click)="action.set('KEEP')"
      [class]="cn('flex flex-col items-center justify-center p-6 rounded-[1.5rem] transition-all duration-700 border-2 gap-3 group/opt', 
                 action() === 'KEEP' ? 'bg-accent border-accent text-white shadow-2xl shadow-accent/30 scale-105' : 'bg-surface-container-low border-border/5 text-text-muted hover:border-accent/20')">
      <lucide-angular [img]="icons.Target" class="h-6 w-6 opacity-40 group-hover/opt:opacity-100 transition-all"></lucide-angular>
      <div class="text-center">
        <span class="text-[9px] font-black uppercase tracking-[0.3em] font-display block leading-none">Mantener</span>
        <span class="text-[7px] font-black uppercase tracking-[0.2em] opacity-40 italic block mt-1">Parcial</span>
      </div>
    </button>
  </div>
</div>
