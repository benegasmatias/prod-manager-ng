<div class="bg-primary/5 p-5 rounded-[1.5rem] border border-primary/10">
  <div class="flex items-center gap-2 mb-3">
    <lucide-angular [img]="icons.Check" class="h-3 w-3 text-primary"></lucide-angular>
    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-primary/80 uppercase tracking-widest leading-relaxed">
      Plantillas de Ingeniería
    </span>
  </div>
  <div class="flex flex-wrap gap-2">
    @for (tpl of metalTemplates; track tpl.label) {
      <button
        type="button"
        (click)="onApply.emit(tpl.data)"
        class="px-3 py-1.5 rounded-lg border border-border/5 bg-surface-container-low text-[10px] font-bold text-primary hover:bg-primary/5 transition-all hover:border-primary/30"
      >
        {{ tpl.label }}
      </button>
    }
  </div>
</div>
