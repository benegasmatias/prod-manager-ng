<div 
  (click)="layout.isMobile() ? onEdit.emit(material()) : null"
  [class.cursor-pointer]="layout.isMobile()"
  class="group relative overflow-hidden bg-white dark:bg-zinc-900 rounded-[2.5rem] p-8 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.06)] border border-border/5 transition-all duration-500 hover:shadow-2xl hover:-translate-y-1 animate-slide-up">
  
  <!-- Top Row: Color & Info -->
  <div class="flex items-start justify-between mb-8">
    <div class="flex items-center gap-4">
      <div
        class="h-14 w-14 rounded-full border-4 border-white dark:border-zinc-800 shadow-xl"
        [style.backgroundColor]="material().color || '#ccc'"
      ></div>
      <div>
        <h3 class="text-xl font-black text-zinc-900 dark:text-zinc-100 uppercase tracking-tighter">{{ material().name }}</h3>
        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mt-1">
          {{ material().type }} • {{ material().brand || 'Genérico' }}
        </p>
      </div>
    </div>
    
    <!-- Action Icons -->
    <div class="flex items-center gap-2">
      <button (click)="onEdit.emit(material())" class="h-10 w-10 flex items-center justify-center bg-zinc-50 dark:bg-zinc-800 text-zinc-400 hover:text-primary rounded-full transition-all">
        <lucide-angular [img]="icons.Edit2" class="h-4 w-4"></lucide-angular>
      </button>
      <button (click)="onDelete.emit(material().id)" class="h-10 w-10 flex items-center justify-center bg-zinc-50 dark:bg-zinc-800 text-zinc-400 hover:text-rose-500 rounded-full transition-all">
        <lucide-angular [img]="icons.Trash2" class="h-4 w-4"></lucide-angular>
      </button>
    </div>
  </div>

  <!-- Capacity Section -->
  <div class="space-y-4 mb-8">
    <div class="flex justify-between items-end">
      <span class="text-[9px] font-black text-primary uppercase tracking-[0.3em] italic">Capacidad</span>
      <div class="flex items-baseline gap-1">
        <span class="text-2xl font-black text-zinc-900 dark:text-zinc-100 tabular-nums">{{ material().remainingWeightGrams }}</span>
        <span class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">{{ material().unit }}</span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="h-3 w-full bg-zinc-100 dark:bg-zinc-800/40 rounded-full overflow-hidden p-0.5 border border-border/5">
      <div
        [class]="cn(
          'h-full rounded-full transition-all duration-1000 ease-out shadow-lg',
          getPercent() < 20 ? 'bg-rose-500' : 'bg-primary'
        )"
        [style.width.%]="getPercent()"
      ></div>
    </div>
  </div>

  <!-- Technical Details Footer -->
  <div class="space-y-4">
    <div class="flex items-center gap-6">
       <div class="flex items-center gap-2 text-zinc-500">
          <lucide-angular [img]="icons.Droplets" class="h-3.5 w-3.5 rotate-180"></lucide-angular>
          <span class="text-[9px] font-black uppercase tracking-widest">Nozzle: <span class="text-zinc-900 dark:text-zinc-100">{{ material().nozzleTemperature || '205' }}°C</span></span>
       </div>
    </div>
    
    <div class="flex items-center justify-between">
       <div class="flex items-center gap-2 text-zinc-500">
          <lucide-angular [img]="icons.Activity" class="h-3.5 w-3.5"></lucide-angular>
          <span class="text-[9px] font-black uppercase tracking-widest">Esterilización: <span class="text-zinc-900 dark:text-zinc-100">{{ material().bedTemperature || '60' }}°C</span></span>
       </div>

       <!-- Status Badge -->
       <span class="px-4 py-1.5 rounded-xl bg-zinc-100 dark:bg-zinc-800 text-zinc-400 text-[8px] font-black uppercase tracking-widest italic border border-border/5">
          En Stock
       </span>
    </div>
  </div>

  <!-- Background Decor -->
  <div class="absolute -right-16 -bottom-16 w-48 h-48 bg-primary/5 rounded-full blur-3xl group-hover:scale-110 transition-transform duration-1000"></div>
</div>
