@if (isOpen && order) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-zinc-900/60 backdrop-blur-sm" (click)="close()"></div>
  <div class="relative w-full max-w-md overflow-hidden rounded-[2.5rem] bg-white shadow-xl dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 animate-in fade-in zoom-in duration-300">
    
    <div class="flex items-center justify-between border-b border-zinc-100 dark:border-zinc-800 p-6 bg-zinc-50/50 dark:bg-zinc-950/50">
      <div class="flex items-center gap-3">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 border border-emerald-100 dark:border-emerald-900/50">
          <lucide-angular [img]="icons.ShoppingBag" class="h-6 w-6"></lucide-angular>
        </div>
        <div>
          <h2 class="text-xl font-bold tracking-tight text-zinc-900 dark:text-zinc-50">Vender Stock</h2>
          <p class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Orden #{{order.code}}</p>
        </div>
      </div>
      <button (click)="close()" [disabled]="isSubmitting" class="rounded-full p-2 text-zinc-400 hover:bg-zinc-100 hover:text-zinc-900 dark:hover:bg-zinc-800 dark:hover:text-zinc-50 transition-colors disabled:opacity-50">
        <lucide-angular [img]="icons.X" class="h-5 w-5"></lucide-angular>
      </button>
    </div>

    <form (ngSubmit)="submit()" class="p-6 space-y-6">
      
      <!-- Precio Total -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider flex items-center gap-2">
          <lucide-angular [img]="icons.BadgeDollarSign" class="h-4 w-4 text-emerald-500"></lucide-angular>
          Precio Total de Venta
        </label>
        <div class="relative group">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 font-bold">$</span>
          <input type="number"
                 [(ngModel)]="formData.price" 
                 name="price"
                 min="1"
                 required
                 autocomplete="off"
                 [disabled]="isSubmitting"
                 class="w-full h-12 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 px-8 text-sm font-bold shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 transition-all dark:text-zinc-100" />
        </div>
      </div>

      <!-- Nombre del Cliente -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider flex items-center gap-2">
          <lucide-angular [img]="icons.User" class="h-4 w-4 text-blue-500"></lucide-angular>
          Cliente
        </label>
        <input type="text"
               [(ngModel)]="formData.clientName" 
               name="clientName"
               required
               placeholder="Nombre del cliente final"
               autocomplete="off"
               [disabled]="isSubmitting"
               class="w-full h-12 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 px-4 text-sm font-bold shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all dark:text-zinc-100" />
      </div>

      <!-- Fecha de Entrega -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider flex items-center gap-2">
          <lucide-angular [img]="icons.Calendar" class="h-4 w-4 text-orange-500"></lucide-angular>
          Fecha de Entrega / Venta
        </label>
        <input type="date"
               [(ngModel)]="formData.date" 
               name="date"
               required
               [disabled]="isSubmitting"
               class="w-full h-12 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 px-4 text-sm font-bold shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all dark:text-zinc-100" />
      </div>

      <!-- Notas -->
      <div class="space-y-2">
        <label class="text-xs font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider flex items-center gap-2">
          <lucide-angular [img]="icons.FileText" class="h-4 w-4 text-primary"></lucide-angular>
          Notas (Opcional)
        </label>
        <textarea [(ngModel)]="formData.notes"
                  name="notes"
                  rows="3"
                  placeholder="Observaciones de la venta..."
                  [disabled]="isSubmitting"
                  class="w-full rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 p-4 text-sm font-medium shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all resize-none dark:text-zinc-100"></textarea>
      </div>

      <!-- Footer Buttons -->
      <div class="flex gap-3 pt-4 border-t border-zinc-100 dark:border-zinc-800">
        <app-button-spinner
                [loading]="isSubmitting"
                [disabled]="isSubmitting"
                loadingText="Cancelando..."
                btnClass="flex-1 h-12 rounded-xl font-bold text-sm bg-zinc-100 text-zinc-700 dark:bg-zinc-800 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors"
                (onClick)="close()"
        >
          Cancelar
        </app-button-spinner>
        <app-button-spinner
                [loading]="isSubmitting"
                [disabled]="!formData.clientName || formData.price <= 0"
                loadingText="Procesando..."
                btnClass="flex-[2] h-12 rounded-xl font-bold text-sm bg-emerald-600 text-white shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 hover:shadow-emerald-600/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                (onClick)="submit()"
        >
          <lucide-angular [img]="icons.Check" class="h-4 w-4"></lucide-angular>
          Confirmar Venta
        </app-button-spinner>
      </div>
    </form>
  </div>
</div>
}
