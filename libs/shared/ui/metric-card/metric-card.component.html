<app-base-card 
  [variant]="'ghost'"
  [padding]="'xl'"
  [radius]="'3xl'"
  [border]="true"
  [shadow]="false"
  [class]="cn(cardClasses(), 'bg-white dark:bg-zinc-950 border-zinc-100 dark:border-zinc-800/50')"
  (click)="handleClick()"
>
  @if (loading()) {
    <div class="flex flex-col gap-8 relative z-10 animate-pulse">
      <div class="flex items-center justify-between">
         <div class="h-3 w-24 bg-muted rounded-full"></div>
         <div class="h-10 w-10 bg-muted rounded-full"></div>
      </div>
      <div class="h-10 w-32 bg-muted rounded-2xl"></div>
    </div>
  } @else {
    <div class="flex flex-col justify-between h-full relative z-10 transition-transform duration-500 text-left min-h-[120px]">
      
      <!-- Top Section: Title & Icon -->
      <div class="flex items-start justify-between">
        <span class="text-[9px] font-black uppercase tracking-[0.25em] text-zinc-400 opacity-80 pt-1">
          {{ title() }}
        </span>
        
        <div [class]="cn(
          'h-10 w-10 rounded-full flex items-center justify-center transition-all duration-500 bg-zinc-50 dark:bg-zinc-900 border border-zinc-100/50 dark:border-zinc-800/50',
          variant() === 'highlight' ? 'bg-primary/10 text-primary' : 'text-zinc-400 group-hover:bg-primary/10 group-hover:text-primary group-hover:scale-110'
        )">
          <lucide-angular *ngIf="icon()" [img]="icon()" class="h-4 w-4"></lucide-angular>
        </div>
      </div>

      <!-- Bottom Section: Value & Unit -->
      <div class="flex flex-col gap-1">
        <div class="flex items-baseline gap-2">
          <h3 class="text-4xl font-black tracking-tighter text-zinc-900 dark:text-white tabular-nums">
            {{ value() }}
          </h3>
          @if (subtitle()) {
             <span class="text-xs font-bold text-zinc-400">
               {{ subtitle() }}
             </span>
          }
        </div>

        @if (trendText()) {
          <div class="flex items-center gap-1.5 mt-1 animate-in fade-in slide-in-from-bottom-2 duration-700">
             <div [class]="trendClasses()">
                @if (trendDirection() === 'up') {
                   <lucide-angular [img]="icons.TrendingUp" class="h-3 w-3"></lucide-angular>
                } @else if (trendDirection() === 'down') {
                   <lucide-angular [img]="icons.TrendingDown" class="h-3 w-3"></lucide-angular>
                }
                {{ trendText() }}
             </div>
          </div>
        }
      </div>

      <div class="absolute -bottom-1 left-0 right-0 h-0.5 bg-primary/0 group-hover:bg-primary/20 transition-all rounded-full"></div>
    </div>
  }
</app-base-card>
