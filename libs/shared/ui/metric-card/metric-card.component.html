<app-base-card [variant]="'ghost'" [padding]="'none'" [radius]="'xl'" [border]="true" [shadow]="false"
  [class]="cn(cardClasses(), 'bg-surface-container-low border-border/5')" (click)="handleClick()">
  <!-- INDUSTRIAL BACKGROUND DECORATION -->
  <div
    class="absolute -right-6 -bottom-6 h-32 w-32 rounded-full blur-[4rem] opacity-30 group-hover:opacity-50 transition-opacity duration-1000"
    [class]="cn(accentColor() ? 'bg-' + accentColor() + '-500' : 'bg-primary')">
  </div>

  @if (loading()) {
  <div class="flex flex-col gap-4 md:gap-8 relative z-10 animate-pulse">
    <div class="flex items-center justify-between">
      <div class="h-3 w-24 bg-muted rounded-full"></div>
      <div class="h-8 md:h-10 w-8 md:w-10 bg-muted rounded-full"></div>
    </div>
    <div class="h-8 md:h-10 w-24 md:w-32 bg-muted rounded-2xl"></div>
  </div>
  } @else {
  <div
    class="flex flex-col justify-between h-full relative z-10 transition-transform duration-500 text-left min-h-[120px] md:min-h-[160px] gap-4 md:gap-8 p-4 md:p-6">

    <!-- Top Section: Title & Icon -->
    <div class="flex items-start justify-between gap-4">
      <div class="flex flex-col gap-3 min-w-0 flex-1">
        <div class="flex flex-wrap gap-2">
          <div class="px-3 py-1 bg-surface-container-high rounded-full">
            <span
              class="text-[10px] font-bold uppercase tracking-[0.1em] text-text-muted group-hover:text-primary transition-colors leading-relaxed italic">
              {{ title() }}
            </span>
          </div>
          @if (badgeText()) {
          <span
            class="text-[7.5px] font-black px-2 py-1 rounded-lg bg-primary/10 text-primary uppercase tracking-widest leading-none">{{
            badgeText() }}</span>
          }
        </div>
      </div>

      <div [class]="cn(
          'h-8 w-8 md:h-12 md:w-12 rounded-xl md:rounded-2xl flex items-center justify-center transition-all duration-700 bg-surface-container-lowest border border-border/10 shadow-sm group-hover:shadow-xl group-hover:shadow-primary/5 group-hover:scale-110 shrink-0',
          variant() === 'highlight' ? 'bg-primary text-white' : 'text-text-muted/40 group-hover:text-primary group-hover:bg-primary/5'
        )">
        <lucide-angular *ngIf="icon()" [img]="icon()" class="h-3.5 w-3.5 md:h-5 md:w-5"></lucide-angular>
      </div>
    </div>

    <!-- Bottom Section: Value & Unit -->
    <div class="flex flex-col mt-auto gap-1 md:gap-2 min-w-0">
      <div class="flex flex-col gap-1 md:gap-2">
        <h3 class="text-xl md:text-2xl xl:text-4xl font-black tracking-tighter text-text tabular-nums leading-[0.9] break-words italic">
          {{ value() }}
        </h3>
        @if (subtitle()) {
        <span
          class="text-[10px] font-medium text-text-muted uppercase tracking-tight italic opacity-40 leading-snug max-w-[140px]">
          {{ subtitle() }}
        </span>
        }
      </div>

      @if (trendText()) {
      <div class="flex items-center gap-2 mt-2 animate-in fade-in slide-in-from-bottom-2 duration-700">
        <div [class]="trendClasses()">
          <div class="flex items-center gap-1 px-2 py-1 bg-current/10 rounded-full">
            @if (trendDirection() === 'up') {
            <lucide-angular [img]="icons.TrendingUp" class="h-3 w-3"></lucide-angular>
            } @else if (trendDirection() === 'down') {
            <lucide-angular [img]="icons.TrendingDown" class="h-3 w-3"></lucide-angular>
            }
            <span class="text-[10px] font-bold uppercase tracking-widest italic">{{ trendText() }}</span>
          </div>
        </div>
      </div>
      }
    </div>

    <!-- Accent Spotlight (Subtle) -->
    <div
      class="absolute -right-4 -bottom-4 w-32 h-32 blur-3xl opacity-0 group-hover:opacity-20 transition-opacity duration-1000 rounded-full"
      [style.background-color]="accentColor() || 'var(--primary)'"></div>
  </div>
  }
</app-base-card>
