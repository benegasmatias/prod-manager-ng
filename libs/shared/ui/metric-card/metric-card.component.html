<app-base-card 
  [variant]="variant() === 'highlight' ? 'flat' : 'default'"
  [tone]="'metric'"
  [hover]="true"
  [padding]="'lg'"
  [shadow]="variant() === 'default'"
  [class]="cardClasses()"
  (click)="handleClick()"
>
  <!-- Background Decorations (Optional per variant) -->
  <div class="absolute -top-10 -right-10 h-40 w-40 rounded-full blur-3xl transition-all group-hover:scale-150 duration-700 pointer-events-none"
    [ngClass]="variant() === 'highlight' ? 'bg-white/10' : 'bg-primary/5'">
  </div>

  @if (loading()) {
    <div class="flex flex-col gap-6 relative z-10 animate-pulse">
      <div class="flex items-center justify-between">
         <div class="h-3 w-20 bg-muted rounded"></div>
         <div class="h-10 w-10 bg-muted rounded-xl"></div>
      </div>
      <div class="space-y-2">
         <div class="h-8 w-32 bg-muted rounded"></div>
         <div class="h-2 w-16 bg-muted rounded"></div>
      </div>
    </div>
  } @else {
    <div class="flex flex-col gap-6 relative z-10 transition-transform duration-500 text-left h-full">
      
      <!-- Top Section: Title & Icon/Badge -->
      <div class="flex items-center justify-between">
        <div class="flex flex-col gap-1.5 flex-1 min-w-0 pr-2">
          <span class="text-[10px] font-black uppercase tracking-[0.2em] transition-colors truncate"
            [ngClass]="variant() === 'highlight' ? 'text-primary-foreground/70' : 'text-text-muted group-hover:text-primary'">
            {{ title() }}
          </span>
          @if (badgeText()) {
            <span [class]="badgeClasses()">{{ badgeText() }}</span>
          }
        </div>
        
        <div [class]="iconClasses()">
          <lucide-angular *ngIf="icon()" [img]="icon()" class="h-6 w-6"></lucide-angular>
        </div>
      </div>

      <!-- Main Section: Value & Metrics -->
      <div class="mt-auto space-y-1">
        <div class="flex items-baseline gap-2 flex-wrap">
          <h3 class="text-3xl font-black tracking-tight flex items-baseline gap-1"
            [ngClass]="variant() === 'highlight' ? 'text-white' : 'text-text'">
            <span class="group-hover:translate-x-1 transition-transform inline-block tabular-nums">{{ value() }}</span>
          </h3>
          @if (subtitle()) {
             <span class="text-xs font-bold leading-none truncate max-w-full"
               [ngClass]="variant() === 'highlight' ? 'text-white/40' : 'text-text-muted/60'">
               {{ subtitle() }}
             </span>
          }
        </div>

        @if (trendText()) {
          <div class="flex items-center gap-1.5 mt-2 animate-in fade-in slide-in-from-bottom-2 duration-700">
             <div [class]="trendClasses()">
                @if (trendDirection() === 'up') {
                  <lucide-angular [img]="icons.TrendingUp" class="h-3 w-3"></lucide-angular>
                } @else if (trendDirection() === 'down') {
                  <lucide-angular [img]="icons.TrendingDown" class="h-3 w-3"></lucide-angular>
                }
                {{ trendText() }}
             </div>
          </div>
        }
        
        <div class="pt-2">
           <ng-content></ng-content>
        </div>
      </div>

    </div>
  }

</app-base-card>
