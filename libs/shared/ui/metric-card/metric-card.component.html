<app-base-card 
  [variant]="'ghost'"
  [padding]="'xl'"
  [radius]="'3xl'"
  [border]="true"
  [shadow]="false"
  [class]="cn(cardClasses(), 'bg-white dark:bg-zinc-950 border-zinc-100 dark:border-zinc-800/50')"
  (click)="handleClick()"
>
  <!-- INDUSTRIAL BACKGROUND DECORATION -->
  <div class="absolute -right-6 -bottom-6 h-32 w-32 rounded-full blur-[4rem] opacity-30 group-hover:opacity-50 transition-opacity duration-1000"
    [class]="cn(accentColor() ? 'bg-' + accentColor() + '-500' : 'bg-primary')">
  </div>
  <div class="absolute top-0 right-0 w-full h-full opacity-[0.03] transition-opacity duration-700 pointer-events-none group-hover:opacity-[0.08]">
     <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
       <defs>
         <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
           <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5"/>
         </pattern>
       </defs>
       <rect width="100%" height="100%" fill="url(#grid)" />
     </svg>
  </div>

  @if (loading()) {
    <div class="flex flex-col gap-8 relative z-10 animate-pulse">
      <div class="flex items-center justify-between">
         <div class="h-3 w-24 bg-muted rounded-full"></div>
         <div class="h-10 w-10 bg-muted rounded-full"></div>
      </div>
      <div class="h-10 w-32 bg-muted rounded-2xl"></div>
    </div>
  } @else {
    <div class="flex flex-col justify-between h-full relative z-10 transition-transform duration-500 text-left min-h-[140px]">
      
      <!-- Top Section: Title & Icon -->
      <div class="flex items-start justify-between">
        <div class="flex flex-col gap-1">
          <span class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400 pt-1 group-hover:text-primary transition-colors">
            {{ title() }}
          </span>
          @if (badgeText()) {
            <span class="text-[8px] font-black px-1.5 py-0.5 rounded-lg bg-zinc-100 text-zinc-500 w-fit">{{ badgeText() }}</span>
          }
        </div>
        
        <div [class]="cn(
          'h-11 w-11 rounded-2xl flex items-center justify-center transition-all duration-700 bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 shadow-sm group-hover:shadow-xl group-hover:shadow-primary/10 group-hover:-translate-y-1 group-hover:rotate-6',
          variant() === 'highlight' ? 'bg-primary text-white border-primary shadow-primary/20' : 'text-zinc-300 group-hover:text-primary group-hover:border-primary/20'
        )">
          <lucide-angular *ngIf="icon()" [img]="icon()" class="h-4 w-4"></lucide-angular>
        </div>
      </div>

      <!-- Bottom Section: Value & Unit -->
      <div class="flex flex-col gap-1">
        <div class="flex items-baseline gap-2">
          <h3 class="text-4xl font-black tracking-tighter text-zinc-900 dark:text-white tabular-nums">
            {{ value() }}
          </h3>
          @if (subtitle()) {
             <span class="text-xs font-bold text-zinc-400">
               {{ subtitle() }}
             </span>
          }
        </div>

        @if (trendText()) {
          <div class="flex items-center gap-1.5 mt-1 animate-in fade-in slide-in-from-bottom-2 duration-700">
             <div [class]="trendClasses()">
                @if (trendDirection() === 'up') {
                   <lucide-angular [img]="icons.TrendingUp" class="h-3 w-3"></lucide-angular>
                } @else if (trendDirection() === 'down') {
                   <lucide-angular [img]="icons.TrendingDown" class="h-3 w-3"></lucide-angular>
                }
                {{ trendText() }}
             </div>
          </div>
        }
      </div>

      <div class="absolute -bottom-1 left-0 right-0 h-0.5 bg-primary/0 group-hover:bg-primary/20 transition-all rounded-full"></div>
    </div>
  }
</app-base-card>
