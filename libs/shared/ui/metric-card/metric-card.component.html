<app-base-card 
  [variant]="'ghost'"
  [padding]="'none'"
  [radius]="'2xl'"
  [border]="true"
  [shadow]="false"
  [class]="cn(cardClasses(), 'bg-white dark:bg-zinc-950 border-zinc-100 dark:border-zinc-800/50 p-[var(--card-p)]')"
  (click)="handleClick()"
>
  <!-- INDUSTRIAL BACKGROUND DECORATION -->
  <div class="absolute -right-6 -bottom-6 h-32 w-32 rounded-full blur-[4rem] opacity-30 group-hover:opacity-50 transition-opacity duration-1000"
    [class]="cn(accentColor() ? 'bg-' + accentColor() + '-500' : 'bg-primary')">
  </div>
  
  @if (loading()) {
    <div class="flex flex-col gap-4 md:gap-8 relative z-10 animate-pulse">
      <div class="flex items-center justify-between">
         <div class="h-3 w-24 bg-muted rounded-full"></div>
         <div class="h-8 md:h-10 w-8 md:w-10 bg-muted rounded-full"></div>
      </div>
      <div class="h-8 md:h-10 w-24 md:w-32 bg-muted rounded-2xl"></div>
    </div>
  } @else {
    <div class="flex flex-col justify-between h-full relative z-10 transition-transform duration-500 text-left min-h-[120px] md:min-h-[140px] gap-2 md:gap-0 py-1">
      
      <!-- Top Section: Title & Icon -->
      <div class="flex items-start justify-between gap-1">
        <div class="flex flex-col gap-0.5">
          <span class="text-[9px] xl:text-[10px] font-black uppercase tracking-[0.1em] xl:tracking-[0.3em] text-zinc-400 group-hover:text-primary transition-colors line-clamp-2 leading-tight">
            {{ title() }}
          </span>
          @if (badgeText()) {
            <span class="text-[7.5px] font-black px-1 py-0.5 rounded-lg bg-zinc-100 text-zinc-500 w-fit">{{ badgeText() }}</span>
          }
        </div>
        
        <div [class]="cn(
          'h-7 w-7 xl:h-11 xl:w-11 rounded-lg xl:rounded-2xl flex items-center justify-center transition-all duration-700 bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 shadow-sm group-hover:shadow-xl group-hover:shadow-primary/10 shrink-0',
          variant() === 'highlight' ? 'bg-primary text-white border-primary shadow-primary/20' : 'text-zinc-300 group-hover:text-primary group-hover:border-primary/20'
        )">
          <lucide-angular *ngIf="icon()" [img]="icon()" class="h-3.5 w-3.5 xl:h-4 xl:w-4"></lucide-angular>
        </div>
      </div>
 
      <!-- Bottom Section: Value & Unit -->
      <div class="flex flex-col gap-0.5 md:gap-1 mt-auto">
        <div class="flex items-baseline gap-1.5 xl:gap-2">
          <h3 class="text-2xl xl:text-4xl font-black tracking-tighter text-zinc-900 dark:text-white tabular-nums">
            {{ value() }}
          </h3>
          @if (subtitle()) {
             <span class="text-[10px] md:text-xs font-bold text-zinc-400">
               {{ subtitle() }}
             </span>
          }
        </div>
 
        @if (trendText()) {
          <div class="flex items-center gap-1.5 mt-0.5 md:mt-1 animate-in fade-in slide-in-from-bottom-2 duration-700">
             <div [class]="trendClasses()">
                @if (trendDirection() === 'up') {
                   <lucide-angular [img]="icons.TrendingUp" class="h-2.5 w-2.5 md:h-3 md:w-3"></lucide-angular>
                } @else if (trendDirection() === 'down') {
                   <lucide-angular [img]="icons.TrendingDown" class="h-2.5 w-2.5 md:h-3 md:w-3"></lucide-angular>
                }
                {{ trendText() }}
             </div>
          </div>
        }
      </div>
 
      <div class="absolute -bottom-1 left-0 right-0 h-0.5 bg-primary/0 group-hover:bg-primary/20 transition-all rounded-full hidden md:block"></div>
    </div>
  }
</app-base-card>
