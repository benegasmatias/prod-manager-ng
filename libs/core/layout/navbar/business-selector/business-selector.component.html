<div class="relative inline-block text-left" *ngIf="sessionService.activeNegocio() as active">
  <!-- Trigger Button (Navbar) -->
  <button
    type="button"
    (click)="toggleDropdown($event)"
    class="flex items-center gap-3 px-3 py-2 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-all active:scale-[0.98] group"
    [class.bg-zinc-100]="dropdownOpen()"
    [class.dark:bg-zinc-800/50]="dropdownOpen()"
  >
    <div class="w-9 h-9 rounded-xl bg-primary/10 flex items-center justify-center shrink-0 group-hover:bg-primary/20 transition-colors">
      <lucide-angular [img]="icons.Building2" class="h-4.5 w-4.5 text-primary"></lucide-angular>
    </div>

    <div class="hidden sm:flex flex-col items-start leading-none gap-1.5">
      <span class="text-[11px] font-black uppercase tracking-tight text-zinc-900 dark:text-zinc-50">{{ active.nombre }}</span>
      <div class="flex items-center gap-1.5">
        @if (sessionService.activeSubscription(); as sub) {
          <span class="px-2 py-0.5 rounded-md bg-amber-500/15 text-amber-600 dark:text-amber-400 text-[8px] font-black uppercase tracking-widest border border-amber-500/30">
            {{ sub.planName }}
          </span>
        }
        <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">{{ active.userRole }}</span>
      </div>
    </div>

    <lucide-angular [img]="icons.ChevronDown" class="h-4 w-4 text-zinc-400 transition-transform duration-300" [class.rotate-180]="dropdownOpen()"></lucide-angular>
  </button>

  <!-- Premium Workspace Selector Modal/Dropdown -->
  <div
    *ngIf="dropdownOpen()"
    class="fixed sm:absolute top-20 sm:top-full left-4 right-4 sm:left-0 sm:right-auto sm:mt-4 w-auto sm:w-[380px] bg-surface-container-lowest border border-border/10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] z-[100] animate-in fade-in slide-in-from-top-4 duration-300 overflow-hidden flex flex-col"
  >
    <!-- Header -->
    <div class="px-8 pt-8 pb-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-[1.25rem] bg-primary/10 flex items-center justify-center">
          <lucide-angular [img]="icons.Briefcase" class="h-6 w-6 text-primary"></lucide-angular>
        </div>
        <div class="flex flex-col">
          <h3 class="text-lg font-black text-text tracking-tight">Mis Negocios</h3>
          <span class="text-[11px] font-bold text-text-muted uppercase tracking-widest">Select workspace</span>
        </div>
      </div>
      <button 
        (click)="layoutService.activeDropdown.set(null)"
        class="h-10 w-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors group"
      >
        <lucide-angular [img]="icons.X" class="h-5 w-5 text-text-muted group-hover:text-text transition-colors"></lucide-angular>
      </button>
    </div>

    <!-- Workspace List -->
    <div class="px-6 pb-6 space-y-2 max-h-[400px] overflow-y-auto custom-scrollbar">
      @for (negocio of sessionService.negocios(); track negocio.id) {
        @let isActive = active.id === negocio.id;
        @let rubroIcon = negocio.rubro === 'IMPRESION_3D' ? icons.Printer : (negocio.rubro === 'KIOSCO' ? icons.Store : icons.Box);
        
        <button
          (click)="handleSelect(negocio.id)"
          class="w-full flex items-center gap-4 p-5 rounded-[1.75rem] transition-all relative overflow-hidden text-left group"
          [ngClass]="{
            'bg-primary/5 border border-primary/10': isActive,
            'bg-surface-container-low hover:bg-surface-container transition-all active:scale-[0.98]': !isActive
          }"
        >
          <!-- Active Indicator Check -->
          @if (isActive) {
            <div class="absolute right-5 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
              <lucide-angular [img]="icons.CheckCircle2" class="h-3.5 w-3.5 text-white"></lucide-angular>
            </div>
          }

          <!-- Business Icon -->
          <div 
            class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 transition-all shadow-sm"
            [ngClass]="{
              'bg-primary text-white': isActive,
              'bg-surface-container-high text-text-muted': !isActive
            }"
          >
            <lucide-angular [img]="rubroIcon" class="h-5 w-5"></lucide-angular>
          </div>

          <!-- Business Info -->
          <div class="flex flex-col items-start leading-tight">
            <span 
              class="text-sm font-black uppercase tracking-tight transition-colors"
              [ngClass]="isActive ? 'text-primary' : 'text-text'"
            >
              {{ negocio.nombre }}
            </span>
            <span class="text-[10px] font-black uppercase tracking-[0.1em] text-text-muted mt-0.5">
              {{ negocio.userRole }}
            </span>
          </div>
        </button>
      }

      <!-- Add New Business Action -->
      <button class="w-full flex items-center justify-center gap-3 p-5 border-2 border-dashed border-primary/10 rounded-[1.75rem] hover:bg-primary/5 transition-all group mt-2">
        <div class="h-6 w-6 rounded-full bg-primary/10 flex items-center justify-center group-hover:scale-110 transition-transform">
          <lucide-angular [img]="icons.Plus" class="h-4 w-4 text-primary"></lucide-angular>
        </div>
        <span class="text-[13px] font-black text-primary tracking-tight">Añadir nuevo negocio</span>
      </button>
    </div>
  </div>
</div>
