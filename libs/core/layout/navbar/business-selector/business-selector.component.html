<div class="relative inline-block text-left" *ngIf="sessionService.activeNegocio() as active">
  <button
    type="button"
    (click)="toggleDropdown($event)"
    class="flex items-center gap-3 px-3 py-2.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-all active:scale-[0.98] group"
    [class.bg-zinc-100]="dropdownOpen()"
    [class.dark:bg-zinc-800/50]="dropdownOpen()"
  >
    <!-- Business Avatar -->
    <div class="w-9 h-9 rounded-xl bg-primary/10 flex items-center justify-center shrink-0 shadow-inner group-hover:bg-primary/20 transition-colors">
      <lucide-angular [img]="icons.Building2" class="h-4.5 w-4.5 text-primary"></lucide-angular>
    </div>

    <!-- Active Text -->
    <div class="hidden sm:flex flex-col items-start leading-none gap-1">
      <span class="text-xs font-black uppercase tracking-tight text-zinc-900 dark:text-zinc-50">{{ active.nombre }}</span>
        <div class="flex items-center gap-1.5">
          @if (sessionService.activeSubscription(); as sub) {
            <span class="px-2 py-0.5 rounded-md bg-amber-500/15 text-amber-600 dark:text-amber-400 text-[8px] font-black uppercase tracking-widest border border-amber-500/30">
              {{ sub.planName }}
            </span>
            <div class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
          }
          <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">{{ active.rubro }}</span>
          <div class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
          <span class="text-[9px] font-black uppercase tracking-widest text-primary/80">{{ active.userRole }}</span>
        </div>
      </div>

    <lucide-angular [img]="icons.ChevronDown" class="h-4 w-4 text-zinc-400 transition-transform duration-300" [class.rotate-180]="dropdownOpen()"></lucide-angular>
  </button>

  <!-- Dropdown Menu -->
  <div
    *ngIf="dropdownOpen()"
    class="absolute left-0 mt-3 w-72 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl shadow-2xl z-50 animate-in fade-in slide-in-from-top-2 duration-200 overflow-hidden"
  >
    <div class="p-4 space-y-1">
      <div class="px-2 pb-3 pt-1">
        <h3 class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400">Mis Negocios</h3>
      </div>

      <div class="max-h-[300px] overflow-y-auto space-y-1 custom-scrollbar">
        @for (negocio of sessionService.negocios(); track negocio.id) {
          <button
            (click)="handleSelect(negocio.id)"
            class="w-full flex items-center gap-4 p-3 rounded-2xl transition-all group relative overflow-hidden text-left"
            [class.bg-primary/5]="active.id === negocio.id"
            [class.border-l-4]="active.id === negocio.id"
            [class.border-primary]="active.id === negocio.id"
            [class.hover:bg-zinc-50]="active.id !== negocio.id"
            [class.dark:hover:bg-zinc-800/80]="active.id !== negocio.id"
          >
            <!-- Badge for active -->
            <div *ngIf="active.id === negocio.id" class="absolute right-4 top-1/2 -translate-y-1/2">
              <lucide-angular [img]="icons.CheckCircle2" class="h-4 w-4 text-primary"></lucide-angular>
            </div>

            <div class="w-10 h-10 rounded-xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform shadow-sm">
              <span class="text-xs font-black text-zinc-400 group-hover:text-primary transition-colors">{{ negocio.nombre.charAt(0) }}</span>
            </div>

            <div class="flex flex-col items-start leading-tight">
              <span class="text-xs font-black uppercase text-zinc-700 dark:text-zinc-200">{{ negocio.nombre }}</span>
              <div class="flex items-center gap-1.5">
                @if (negocio.plan) {
                  <span class="px-1.5 py-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-[8px] font-black uppercase tracking-widest text-zinc-400 border border-zinc-200 dark:border-zinc-700">
                    {{ negocio.plan }}
                  </span>
                  <div class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-zinc-800"></div>
                }
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">{{ negocio.rubro }}</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-primary/60">{{ negocio.userRole }}</span>
              </div>
            </div>
          </button>
        }
      </div>
    </div>

    <!-- Actions Section -->
    <div class="p-3 bg-zinc-50 dark:bg-zinc-950/40 border-t border-zinc-100 dark:border-zinc-800 space-y-1">
      <button
        (click)="handleLogout()"
        class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-rose-50 dark:hover:bg-rose-950/20 text-rose-500 transition-colors group"
      >
        <lucide-angular [img]="icons.X" class="h-4 w-4"></lucide-angular>
        <span class="text-[10px] font-black uppercase tracking-widest">Cerrar Sesión</span>
      </button>
    </div>
  </div>
</div>
