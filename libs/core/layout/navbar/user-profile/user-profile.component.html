<div class="relative">
  <button (click)="toggleDropdown($event)"
    class="h-11 flex items-center gap-3 px-2 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all group border border-transparent">
    <div
      class="h-9 w-9 rounded-xl bg-primary/10 flex items-center justify-center border border-primary/20 shrink-0 group-hover:scale-105 transition-transform">
      <lucide-angular [img]="icons.User" class="h-5 w-5 text-primary"></lucide-angular>
    </div>
    <div class="hidden sm:flex flex-col items-start leading-none gap-1">
      <span class="text-sm font-black tracking-tight group-hover:text-primary transition-colors truncate max-w-[120px]">
        {{ displayName() }}
      </span>
      <span class="text-[10px] font-bold text-primary/60 uppercase tracking-widest leading-none">Admin</span>
    </div>
    <lucide-angular [img]="icons.ChevronDown" class="h-3 w-3 text-zinc-400 group-hover:text-zinc-600 transition-all"
      [class.rotate-180]="dropdownOpen()"></lucide-angular>
  </button>

  @if (dropdownOpen()) {
  <div
    class="absolute top-13 right-0 w-64 bg-white dark:bg-zinc-950 rounded-2xl border border-zinc-200 dark:border-zinc-800 shadow-2xl p-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200 overflow-hidden">
    <div class="bg-primary/5 p-4 mb-2 rounded-xl border border-primary/10">
      <div class="flex flex-col gap-1">
        <span class="text-[10px] font-black uppercase tracking-tight text-primary">Mi Perfil</span>
        <span class="text-[10px] font-bold text-zinc-500 truncate whitespace-nowrap">{{ user()?.email }}</span>
      </div>
    </div>

    <div class="space-y-1">
      <button (click)="handleOpenProfile()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-all group">
        <lucide-angular [img]="icons.Settings" class="h-4 w-4 text-zinc-400 group-hover:text-primary"></lucide-angular>
        <span
          class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400">Configuración</span>
      </button>

      <div class="h-px bg-zinc-100 dark:bg-zinc-800 my-1"></div>

      <button (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-rose-50 text-rose-500 transition-all group">
        <lucide-angular [img]="icons.LogOut"
          class="h-4 w-4 group-hover:scale-110 transition-transform"></lucide-angular>
        <span class="text-[10px] font-black uppercase tracking-widest">Cerrar Sesión</span>
      </button>
    </div>
  </div>
  }
</div>

<!-- Profile Dialog -->
<dialog #profileDialog
  class="fixed inset-0 m-auto bg-transparent backdrop:bg-zinc-950/60 backdrop:backdrop-blur-sm p-0 border-none outline-none overflow-visible open:flex items-center justify-center">
  @if (isDialogOpen()) {
  <div
    class="bg-white dark:bg-zinc-950 w-[90vw] max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300 pointer-events-auto"
    (click)="$event.stopPropagation()">
    <div
      class="p-8 border-b border-zinc-100 dark:border-zinc-900 bg-zinc-50/50 dark:bg-zinc-900/10 flex items-center gap-4">
      <div class="h-12 w-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center">
        <lucide-angular [img]="icons.User" class="h-6 w-6"></lucide-angular>
      </div>
      <div class="space-y-1">
        <h3 class="text-xl font-bold tracking-tight">Configuración de Perfil</h3>
        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Identidad en el sistema</p>
      </div>
    </div>

    <div class="p-8 space-y-6">
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-1">Correo Electrónico</label>
        <input [value]="user()?.email || ''" disabled
          class="w-full h-12 px-5 bg-zinc-50/50 dark:bg-zinc-900/50 rounded-2xl font-bold opacity-70 cursor-not-allowed outline-none">
      </div>
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-1">Nombre Completo</label>
        <input [(ngModel)]="profileName"
          class="w-full h-12 px-5 bg-zinc-50 dark:bg-zinc-900 focus:ring-2 focus:ring-primary/20 rounded-2xl font-bold outline-none transition-all"
          placeholder="Tu nombre">
      </div>
    </div>

    <div class="p-8 pt-0 flex flex-col gap-3">
      <button (click)="handleUpdateProfile()" [disabled]="isSaving() || !profileName()"
        class="w-full h-12 rounded-2xl font-black uppercase tracking-widest text-xs bg-primary text-white shadow-xl shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98] disabled:opacity-50">
        {{ isSaving() ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
      <button (click)="closeDialog()"
        class="w-full h-10 rounded-2xl font-bold uppercase tracking-widest text-[10px] text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-all">
        Cerrar
      </button>
    </div>
  </div>
  }
</dialog>
