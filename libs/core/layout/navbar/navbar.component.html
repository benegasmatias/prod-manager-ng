<header 
  class="fixed top-0 right-0 z-30 flex h-16 items-center justify-between border-b border-zinc-200/60 bg-white/80 px-4 sm:px-8 backdrop-blur-md dark:border-zinc-800/50 dark:bg-zinc-950/80 transition-all duration-200"
  [style.left.px]="layoutService.sidebarWidth()"
>
  <div class="flex items-center gap-4 flex-1">
    <!-- Hamburger/Sidebar Toggle -->
    <button 
      (click)="layoutService.togglePinned()"
      class="hidden lg:flex h-10 w-10 items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors"
    >
      <lucide-angular 
        [img]="icons.Menu" 
        [class.text-primary]="layoutService.isPinned()" 
        [class.text-zinc-400]="!layoutService.isPinned()"
        class="h-5 w-5 transition-all"
      ></lucide-angular>
    </button>

    <!-- Business Selector Refactored -->
    <app-business-selector></app-business-selector>
  </div>

  <!-- Right Section: Actions & User -->
  <div class="flex items-center gap-2 sm:gap-3">
    
    <div class="flex items-center gap-1">
      <!-- Notifications Refactored -->
      <app-notification-dropdown></app-notification-dropdown>

      <!-- Theme Toggle -->
      <button 
        (click)="toggleTheme()"
        class="h-10 w-10 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors relative"
      >
        <lucide-angular [img]="icons.Sun" class="h-4 w-4 transition-all scale-100 rotate-0 dark:scale-0 dark:-rotate-90"></lucide-angular>
        <lucide-angular [img]="icons.Moon" class="absolute h-4 w-4 scale-0 rotate-90 transition-all dark:scale-100 dark:rotate-0"></lucide-angular>
      </button>
    </div>

    <div class="h-6 w-px bg-zinc-200 dark:bg-zinc-800 mx-1"></div>

    <!-- User Profile Refactored -->
    <app-user-profile></app-user-profile>
  </div>
</header>
