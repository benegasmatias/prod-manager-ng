<div class="flex min-h-screen bg-zinc-50 dark:bg-zinc-950 transition-all duration-300 font-sans selection:bg-primary/10 selection:text-primary overflow-x-hidden relative">
  
  <!-- Content Background Decorations -->
  <div class="fixed top-0 right-0 z-0 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
  <div class="fixed bottom-0 left-0 z-0 w-[300px] h-[300px] bg-indigo-500/5 blur-[100px] rounded-full pointer-events-none"></div>

  <!-- Sidebar Component -->
  <app-sidebar></app-sidebar>

  <!-- Content Area -->
  <div 
    [style.padding-left.px]="layoutService.sidebarWidth()"
    class="flex-1 flex flex-col min-w-0 min-h-screen relative transition-all duration-200 ease-[cubic-bezier(0.4,0,0.2,1)]"
  >
    <!-- Navbar Component -->
    <app-navbar></app-navbar>

    <!-- Main Page Content -->
    <main class="flex-1 mt-16 p-2 sm:p-4 lg:p-6 relative z-10 overflow-visible">
      <div class="animate-in fade-in zoom-in-95 duration-500">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- System Status Footer -->
    <footer class="h-16 shrink-0 border-t border-zinc-100 bg-white/50 dark:bg-zinc-950/50 backdrop-blur-sm dark:border-zinc-800/50 px-8 flex items-center justify-between text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400 z-10">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 shadow-sm animate-pulse"></span>
          <span>Prod-NG Version 1.0</span>
        </div>
        <div class="h-3 w-px bg-zinc-200 dark:bg-zinc-800"></div>
        <span class="hidden sm:inline">Angular 21 + Tailwind 4</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-zinc-500 dark:text-zinc-400">Panel de Control: Matias Benegas</span>
        <div class="h-6 w-6 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center font-black text-primary text-[8px]">MB</div>
      </div>
    </footer>
  </div>

  <!-- Global Confirm Dialog -->
  <app-confirm-dialog></app-confirm-dialog>
</div>
