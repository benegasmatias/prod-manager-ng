<div
  class="flex min-h-screen bg-background text-foreground transition-all duration-300 font-sans selection:bg-primary/10 selection:text-primary overflow-x-hidden relative">

  <!-- Content Background Decorations -->
  <div class="fixed top-0 right-0 z-0 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full pointer-events-none">
  </div>
  <div
    class="fixed bottom-0 left-0 z-0 w-[300px] h-[300px] bg-indigo-500/5 blur-[100px] rounded-full pointer-events-none">
  </div>

  <!-- Mobile Overlay -->
  @if (layoutService.isMobile() && layoutService.isMobileMenuOpen()) {
    <div 
      class="fixed inset-0 z-[45] bg-black/40 backdrop-blur-sm animate-in fade-in duration-300"
      (click)="layoutService.closeMobileMenu()"
    ></div>
  }

  <!-- Sidebar Component -->
  <app-sidebar></app-sidebar>

  <!-- Content Area -->
  <div 
    class="flex-1 flex flex-col min-w-0 min-h-screen relative transition-all duration-300 ease-[cubic-bezier(0.4,0,0.2,1)]"
    [style.padding-left.px]="layoutService.isMobile() ? 0 : (layoutService.isPinned() ? layoutService.constants.SIDEBAR_WIDTH_EXPANDED : layoutService.constants.SIDEBAR_WIDTH_COLLAPSED)"
  >
    <!-- Navbar Component -->
    <app-navbar></app-navbar>

    <!-- Main Page Content -->
    <main class="flex-1 mt-14 sm:mt-16 p-3 sm:p-5 lg:p-8 relative z-10 overflow-visible">
      <div class="animate-in fade-in zoom-in-95 duration-500" style="height: 100%;">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- System Status Footer -->
    <footer
      class="h-14 sm:h-16 shrink-0 border-t border-border bg-bg/50 backdrop-blur-sm px-4 sm:px-8 flex items-center justify-between text-[9px] font-black uppercase tracking-[0.2em] text-text-muted z-10">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <span class="h-1.2 w-1.2 sm:h-1.5 sm:w-1.5 rounded-full bg-success shadow-sm animate-pulse"></span>
          <span>Prod-NG v1.0</span>
        </div>
        <div class="hidden sm:block h-3 w-px bg-border"></div>
        <span class="hidden lg:inline">Angular 21 + Tailwind 4</span>
      </div>

      <!-- Developer Credit -->
      <div class="hidden md:flex items-center gap-2 opacity-50 hover:opacity-100 transition-opacity">
        <span class="font-bold">By</span>
        <span class="text-primary font-black">Shelter solutions digital</span>
      </div>

      <div class="flex items-center gap-2">
        <span class="hidden sm:inline text-text-muted">Panel de Control: Matias Benegas</span>
        <div
          class="h-6 w-6 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center font-black text-primary text-[8px]">
          MB</div>
      </div>
    </footer>
  </div>

  <!-- Global Confirm Dialog -->
  <app-confirm-dialog></app-confirm-dialog>
</div>
